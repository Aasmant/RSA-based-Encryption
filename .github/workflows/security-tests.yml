name: Security Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  vulnerability-tests:
    name: Vulnerability Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Run Vulnerability Tests
      continue-on-error: true
      run: mvn -pl RSA-JavaSpringboot-tests -am test -Dtest=VulnerabilityDemonstrationTest
        
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vulnerability-results
        path: RSA-JavaSpringboot-tests/target/surefire-reports/
        retention-days: 30

  secure-tests:
    name: Secure Implementation Tests
    runs-on: ubuntu-latest
    needs: vulnerability-tests
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Run Secure Tests
      run: mvn -pl RSA-JavaSpringboot-tests -am test -Dtest=SecureImplementationTest
        
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: secure-results
        path: RSA-JavaSpringboot-tests/target/surefire-reports/
        retention-days: 30
